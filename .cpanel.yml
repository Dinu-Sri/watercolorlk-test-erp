---
# .cpanel.yml - controls which files are deployed to the live server.
# Only production runtime files are deployed.
# Documentation, test files, and dev tools stay in GitHub only.
deployment:
  tasks:
    - export DEPLOYPATH=$HOME/public_html/api
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/rm -f $DEPLOYPATH/index.html
    - /bin/rm -f $DEPLOYPATH/product.html
    - /bin/rm -f $DEPLOYPATH/erp-proxy.php
    - /bin/rm -rf $DEPLOYPATH/assets
    - /bin/rm -rf $DEPLOYPATH/src
    - /bin/rm -rf $DEPLOYPATH/api
    - /bin/rm -rf $DEPLOYPATH/admin
    - /bin/rm -rf $DEPLOYPATH/scripts
    - /bin/mkdir -p $DEPLOYPATH/config
    - /bin/cp -R assets $DEPLOYPATH/assets
    - /bin/cp -R src $DEPLOYPATH/src
    - /bin/cp config/app.php $DEPLOYPATH/config/app.php
    - /bin/cp config/local.example.php $DEPLOYPATH/config/local.example.php
    - /bin/cp -R api $DEPLOYPATH/api
    - /bin/cp -R admin $DEPLOYPATH/admin
    - /bin/cp -R scripts $DEPLOYPATH/scripts
    - /bin/cp bootstrap.php $DEPLOYPATH/bootstrap.php
    - /bin/cp .htaccess $DEPLOYPATH/.htaccess
    - /bin/cp robots.txt $DEPLOYPATH/robots.txt
    - /bin/cp design-system.html $DEPLOYPATH/design-system.html
    - /bin/cp index.php $DEPLOYPATH/index.php
    - /bin/cp product.php $DEPLOYPATH/product.php
    - /bin/cp schema.sql $DEPLOYPATH/schema.sql